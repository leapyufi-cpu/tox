        .active-tab { background: #6b7280 !important; color: white !important; }

        <style>
.top4-tool {
  font-family: 'Noto Sans TC', sans-serif;
}

    :root {
    --bg: #f5f4f2;
    --surface: #ffffff;
    --border: #e0ddd8;
    --border2: #ccc9c3;
    --accent: #1a1a1a;
    --accent-light: #444;
    --muted: #888;
    --green: #4a7c59;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--accent); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; padding: 48px 24px 80px; }
  .container { max-width: 860px; margin: 0 auto; }

  header { margin-bottom: 40px; }
  header .brand { font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  header h2 { font-size: 24px; font-weight: 700; letter-spacing: 0.5px; }

  .block { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px 28px; margin-bottom: 12px; }
  .block-label { font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 16px; font-weight: 500; }

  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip { padding: 10px 22px; border: 1.5px solid var(--border2); background: transparent; color: var(--accent-light); border-radius: 7px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; font-size: 15px; font-weight: 500; transition: all 0.15s; }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }

  .spec-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .spec-tag { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 5px 12px; }

  input[type="text"] { width: 100%; padding: 13px 16px; border: 1.5px solid var(--border2); border-radius: 8px; font-family: 'Noto Sans TC', sans-serif; font-size: 16px; font-weight: 500; color: var(--accent); background: var(--surface); outline: none; transition: border-color 0.15s; }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: #bbb; font-weight: 400; }
  .input-sub { margin-top: 7px; font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }

  .color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 18px; }
  .color-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .color-item-label { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 10px; }
  .color-chips { display: flex; gap: 8px; align-items: center; }
  .color-chip { width: 34px; height: 34px; border-radius: 7px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; position: relative; flex-shrink: 0; }
  .color-chip.black-chip { background: #000107; }
  .color-chip.white-chip { background: #ffffff; border: 2px solid var(--border2); }
  .color-chip.active::after { content: ''; position: absolute; inset: -4px; border: 2px solid #4a90d9; border-radius: 9px; }
  .color-chip-label { font-size: 13px; color: var(--accent-light); font-weight: 500; }

  .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .upload-slot-label { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .upload-area { border: 1.5px dashed var(--border2); border-radius: 8px; padding: 28px 16px; text-align: center; cursor: pointer; transition: all 0.15s; position: relative; background: var(--bg); min-height: 130px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
  .upload-area:hover { border-color: var(--accent); background: #eeece8; }
  .upload-area.drag-over { border-color: var(--accent); background: #e8e5e0; }
  .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; z-index: 2; }
  .upload-area.has-image { border-style: solid; border-color: var(--green); background: var(--surface); }
  .upload-area.has-image .upload-placeholder { display: none; }
  .upload-area.has-image .thumb-wrap { display: flex; }
  .thumb-wrap { display: none; flex-direction: column; align-items: center; gap: 7px; pointer-events: none; width: 100%; }
  .thumb { width: 100%; height: 100px; object-fit: cover; border-radius: 5px; }
  .thumb-done { font-size: 12px; color: var(--green); font-family: 'DM Mono', monospace; font-weight: 500; }
  .upload-icon { font-size: 22px; margin-bottom: 8px; color: var(--muted); }
  .upload-text { font-size: 15px; font-weight: 500; color: var(--accent-light); margin-bottom: 3px; }
  .upload-sub { font-size: 12px; color: #bbb; font-family: 'DM Mono', monospace; }

  .upload-status { display: flex; align-items: center; gap: 8px; margin-top: 14px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); flex-wrap: wrap; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); display: inline-block; transition: background 0.3s; flex-shrink: 0; }
  .dot.done { background: var(--green); }

  .preview-section { display: none; }
  .preview-section.show { display: block; }
  .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .preview-label { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  canvas { border-radius: 6px; border: 1px solid var(--border); max-width: 100%; display: block; }

  .dl-btn { display: block; width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: 'Noto Sans TC', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; text-align: center; margin-top: 10px; letter-spacing: 1px; }
  .dl-btn:hover { opacity: 0.75; }
  .reset-btn { display: block; width: 100%; padding: 11px; background: transparent; color: var(--muted); border: 1.5px solid var(--border2); border-radius: 8px; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; margin-top: 8px; }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 580px) {
    .upload-grid, .preview-grid, .color-row { grid-template-columns: 1fr; }
    header h2 { font-size: 20px; }
    .chip { font-size: 14px; padding: 9px 16px; }
  }

        </style>

                <div class="container-box">

<div class="container">
  <header>
    <div class="brand">PAZZO</div>
    <h2>官網首頁熱銷排行 TOP4</h2>
  </header>

  <div class="block">
    <div class="block-label">裝置</div>
    <div class="btn-row">
      <button class="chip active" data-device="pc">PC</button>
      <button class="chip" data-device="mb">Mobile</button>
    </div>
  </div>

  <div class="block">
    <div class="block-label">排名</div>
    <div class="btn-row">
      <button class="chip active" data-top="1">TOP 1</button>
      <button class="chip" data-top="2">TOP 2</button>
      <button class="chip" data-top="3">TOP 3</button>
      <button class="chip" data-top="4">TOP 4</button>
    </div>
    <div class="color-row">
      <div class="color-item">
        <div class="color-item-label">商品平拍 · TOP 文字色</div>
        <div class="color-chips">
          <div class="color-chip black-chip active" data-target="item" data-color="black"></div>
          <div class="color-chip white-chip" data-target="item" data-color="white"></div>
          <span class="color-chip-label" id="itemColorLabel">黑色</span>
        </div>
      </div>
      <div class="color-item">
        <div class="color-item-label">麻豆照 · TOP 文字色</div>
        <div class="color-chips">
          <div class="color-chip black-chip active" data-target="model" data-color="black"></div>
          <div class="color-chip white-chip" data-target="model" data-color="white"></div>
          <span class="color-chip-label" id="modelColorLabel">黑色</span>
        </div>
      </div>
    </div>
    <div class="spec-row" id="specRow"></div>
  </div>

  <div class="block">
    <div class="block-label">商品名稱</div>
    <input type="text" id="productName" placeholder="例：磨毛立領雙拉鍊針織上衣外套" maxlength="30">
    <div class="input-sub">最多 30 字，輸入後即時更新預覽</div>
  </div>

  <div class="block">
    <div class="block-label">上傳商品圖</div>
    <div class="upload-grid">
      <div>
        <div class="upload-slot-label">商品平拍</div>
        <div class="upload-area" id="uploadArea1">
          <input type="file" id="fileInput1" accept="image/*">
          <div class="upload-placeholder">
            <div class="upload-icon">⬆</div>
            <div class="upload-text">商品平拍</div>
            <div class="upload-sub">點擊或拖拉上傳</div>
          </div>
          <div class="thumb-wrap">
            <img class="thumb" id="thumb1" src="" alt="">
            <div class="thumb-done">已上傳</div>
          </div>
        </div>
      </div>
      <div>
        <div class="upload-slot-label">麻豆照</div>
        <div class="upload-area" id="uploadArea0">
          <input type="file" id="fileInput0" accept="image/*">
          <div class="upload-placeholder">
            <div class="upload-icon">⬆</div>
            <div class="upload-text">麻豆照</div>
            <div class="upload-sub">點擊或拖拉上傳</div>
          </div>
          <div class="thumb-wrap">
            <img class="thumb" id="thumb0" src="" alt="">
            <div class="thumb-done">已上傳</div>
          </div>
        </div>
      </div>
    </div>
    <div class="upload-status">
      <span class="dot" id="dot1"></span> 商品平拍
      <span style="color:var(--border2)">·</span>
      <span class="dot" id="dot0"></span> 麻豆照
      <span style="color:var(--border2)">— 兩張都上傳後顯示預覽</span>

  </div>

    <div class="block-label">預覽 · 下載</div>

        <div class="preview-label">商品平拍</div>
        <canvas id="canvas1"></canvas>
        <button class="dl-btn" id="dlBtn1">下載平拍圖</button>
      </div>
      <div>
        <div class="preview-label">麻豆照</div>
        <canvas id="canvas0"></canvas>

        const MATCH_PARAM = "/match?barcode=";
        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('button[id^="btn-tab"]').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active-tab');
        }

        function cleanSkus(text) {
            if (!text) return "";
            return text.split(/[\n, \s\t]+/).map(item => {
                if (item.includes('barcode=')) return item.split('barcode=')[1];
                if (item.includes('http')) return "";
                return item;
            }).filter(s => s && s.trim() !== '' && !s.includes('http')).join(',');
        }

        function processTab1() {
            let brand = document.getElementById('brandUrl').value.trim();
            const skus = cleanSkus(document.getElementById('skuInput1').value);
            const display = document.getElementById('longUrlDisplay');
            if (!skus) { display.innerText = "等待輸入資料..."; return; }
            if (brand.endsWith('/')) brand = brand.slice(0, -1);
            display.innerText = brand + MATCH_PARAM + skus;
        }

        function processTab2() {
            const skus = cleanSkus(document.getElementById('skuInput2').value);
            document.getElementById('metabaseDisplay').innerText = skus || "等待輸入資料...";
        }

        function copyText(id) {
            const text = document.getElementById(id).innerText;
            if (text.includes("等待") || !text) return;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                const originalText = btn.innerText;
                btn.innerText = "✅ 已複製";
                btn.style.background = "#10b981";
                setTimeout(() => { btn.innerText = originalText; btn.style.background = "#6b7280"; }, 1500);
            });
        }

        function clearTab(n) {
            document.getElementById('skuInput' + n).value = '';
            if (n === 1) processTab1(); else processTab2();
        }
    </script>

// ── 規格（量測自實際圖檔校正）────────────────
const SPECS = {
  pc: {
    frame: { w: 640, h: 875 },
    tops: {
      1: { imgLeft: 108, imgTop: 0, imgW: 531, imgH: 760, topX: 128 },
      2: { imgLeft: 72,  imgTop: 0, imgW: 531, imgH: 760, topX: 92  },
      3: { imgLeft: 37,  imgTop: 0, imgW: 531, imgH: 760, topX: 57  },
      4: { imgLeft: 1,   imgTop: 0, imgW: 531, imgH: 760, topX: 21  },
    },
    // TOP: top=12, lineHeight=35, fontSize=25 → center_y = 12 + 35/2 = 29.5
    topLabel:  { topY: 12, fontSize: 25, lineHeight: 35, fontWeight: '500', letterSpacing: 0.02 },
    // 名稱: 實際量測 center_x=336, center_y=783
    nameLabel: { cx: 336, cy: 783, fontSize: 20, fontWeight: '500', letterSpacing: -0.01 },
  },
  mb: {
    frame: { w: 400, h: 522 },
    tops: {
      1: { imgLeft: 64, imgTop: 0, imgW: 325, imgH: 465, topX: 79 },
      2: { imgLeft: 11, imgTop: 0, imgW: 325, imgH: 465, topX: 26 },
      3: { imgLeft: 64, imgTop: 0, imgW: 325, imgH: 465, topX: 79 },
      4: { imgLeft: 11, imgTop: 0, imgW: 325, imgH: 465, topX: 26 },
    },
    // TOP: 量測 center_y=19 → topY = 19 - lineHeight/2 = 19 - 10.5 = 8.5
    topLabel:  { topY: 9, fontSize: 15, lineHeight: 21, fontWeight: '500', letterSpacing: 0.02 },
    // 名稱: 實際量測 center_y=482, center_x=200（圖寬400正中間）
    nameLabel: { cx: 200, cy: 482, fontSize: 16, fontWeight: '500', letterSpacing: -0.01 },
  }
};

let currentDevice = 'pc';
let currentTop    = 1;
let topColors     = { model: '#000107', item: '#000107' };
let images        = [null, null];

function getDateStr() {
  const d = new Date();
  return String(d.getFullYear()).slice(2) + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
}

function updateSpec() {
  const t = SPECS[currentDevice].tops[currentTop];
  const f = SPECS[currentDevice].frame;
  document.getElementById('specRow').innerHTML = `
    <div class="spec-tag">${f.w} × ${f.h}</div>
    <div class="spec-tag">圖片 ${t.imgW} × ${t.imgH}</div>
    <div class="spec-tag">left ${t.imgLeft}</div>
  `;
}

function drawToCanvas(canvas, img, scale, colorKey) {
  const device = SPECS[currentDevice];
  const t   = device.tops[currentTop];
  const f   = device.frame;
  const tl  = device.topLabel;
  const nl  = device.nameLabel;
  const name = document.getElementById('productName').value.trim();
  const ctx  = canvas.getContext('2d');

  canvas.width  = Math.round(f.w * scale);
  canvas.height = Math.round(f.h * scale);

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 商品圖（cover fit）
  if (img) {
    const ir = img.naturalWidth / img.naturalHeight;
    const br = t.imgW / t.imgH;
    let sw, sh, sx, sy;
    if (ir > br) { sh = img.naturalHeight; sw = sh * br; sy = 0; sx = (img.naturalWidth - sw) / 2; }
    else         { sw = img.naturalWidth;  sh = sw / br; sx = 0; sy = (img.naturalHeight - sh) / 2; }
    ctx.save();
    ctx.beginPath();
    ctx.rect(t.imgLeft * scale, t.imgTop * scale, t.imgW * scale, t.imgH * scale);
    ctx.clip();
    ctx.drawImage(img, sx, sy, sw, sh,
      t.imgLeft * scale, t.imgTop * scale,
      t.imgW * scale, t.imgH * scale);
    ctx.restore();
  }

  // TOP 標籤：用 textBaseline='middle'，cy = topY + lineHeight/2
  ctx.save();
  const topFS = tl.fontSize * scale;
  ctx.font = `${tl.fontWeight} ${topFS}px 'PingFang SC', 'Noto Sans TC', sans-serif`;
  ctx.fillStyle = topColors[colorKey];
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.letterSpacing = (tl.letterSpacing * tl.fontSize * scale) + 'px';
  const topCY = (tl.topY + tl.lineHeight / 2) * scale;
  ctx.fillText(`TOP${currentTop}`, t.topX * scale, topCY);
  ctx.restore();

  // 商品名稱：水平對齊圖片中心，垂直用量測值
  if (name) {
    ctx.save();
    const nameFS = nl.fontSize * scale;
    ctx.font = `${nl.fontWeight} ${nameFS}px 'PingFang SC', 'Noto Sans TC', sans-serif`;
    ctx.fillStyle = '#000000';
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'center';
    ctx.letterSpacing = (nl.letterSpacing * nl.fontSize * scale) + 'px';
    // cx 動態對齊圖片水平中心
    const imgCX = (t.imgLeft + t.imgW / 2) * scale;
    ctx.fillText(name, imgCX, nl.cy * scale);
    ctx.restore();
  }
}

function renderPreviews() {
  if (!images[0] || !images[1]) return;
  const maxW  = Math.min(360, Math.floor((window.innerWidth - 100) / 2));
  const scale = Math.min(1, maxW / SPECS[currentDevice].frame.w);
  drawToCanvas(document.getElementById('canvas0'), images[0], scale, 'model');
  drawToCanvas(document.getElementById('canvas1'), images[1], scale, 'item');
  const sec = document.getElementById('previewSection');
  sec.classList.add('show');
  setTimeout(() => sec.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

async function downloadCanvas(idx) {
  const suffix   = idx === 0 ? 'model' : 'item';
  const colorKey = idx === 0 ? 'model' : 'item';
  const c = document.createElement('canvas');
  drawToCanvas(c, images[idx], 1, colorKey);
  const blob = await new Promise(r => c.toBlob(r, 'image/png'));
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `TOP${currentTop}_${getDateStr()}_${suffix}.png`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

function loadImage(file, idx) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        images[idx] = img;
        document.getElementById(`thumb${idx}`).src = e.target.result;
        document.getElementById(`uploadArea${idx}`).classList.add('has-image');
        document.getElementById(`dot${idx}`).classList.add('done');
        resolve();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

[0, 1].forEach(idx => {
  const input = document.getElementById(`fileInput${idx}`);
  const area  = document.getElementById(`uploadArea${idx}`);
  input.addEventListener('change', async e => {
    if (!e.target.files[0]) return;
    await loadImage(e.target.files[0], idx);
    renderPreviews();
  });
  area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('drag-over'); });
  area.addEventListener('dragleave', () => area.classList.remove('drag-over'));
  area.addEventListener('drop', async e => {
    e.preventDefault();
    area.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) { await loadImage(file, idx); renderPreviews(); }
  });
});

document.querySelectorAll('[data-device]').forEach(btn => btn.addEventListener('click', () => {
  currentDevice = btn.dataset.device;

document.querySelectorAll('[data-top]').forEach(btn => btn.addEventListener('click', () => {

document.querySelectorAll('.color-chip').forEach(chip => chip.addEventListener('click', () => {

  topColors[target] = color === 'white' ? '#ffffff' : '#000107';
  document.querySelectorAll(`.color-chip[data-target="${target}"]`).forEach(c => c.classList.remove('active'));

  renderPreviews();
}));

document.getElementById('productName').addEventListener('input', () => renderPreviews());
document.getElementById('dlBtn0').addEventListener('click', () => downloadCanvas(0));
document.getElementById('dlBtn1').addEventListener('click', () => downloadCanvas(1));
document.getElementById('resetBtn').addEventListener('click', () => {
  // 圖片清空
  images = [null, null];
  [0, 1].forEach(i => {
    document.getElementById(`uploadArea${i}`).classList.remove('has-image');
    document.getElementById(`thumb${i}`).src = '';
    document.getElementById(`dot${i}`).classList.remove('done');
    document.getElementById(`fileInput${i}`).value = '';
  });
  // 商品名稱清空
  document.getElementById('productName').value = '';
  // TOP顏色重置為黑色
  topColors = { model: '#000107', item: '#000107' };
  ['item','model'].forEach(target => {
    document.querySelectorAll(`.color-chip[data-target="${target}"]`).forEach(c => c.classList.remove('active'));
    document.querySelector(`.color-chip[data-target="${target}"][data-color="black"]`).classList.add('active');
  });
  document.getElementById('itemColorLabel').textContent = '黑色';
  document.getElementById('modelColorLabel').textContent = '黑色';
  // 隱藏預覽
  document.getElementById('previewSection').classList.remove('show');
});

updateSpec();
